spring.application.name=MediTrack
server.port=${PORT:8080}
# ============================================
# PostgreSQL (Supabase)
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# ============================================
# Connection Pool (HikariCP)
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# ============================================
# Logging
# ============================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# ============================================
# JSON
# ============================================
spring.jackson.serialization.indent-output=false
# ============================================
# JWT
# ============================================
meditrack.jwt.secret=${JWT_SECRET}
meditrack.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}
# ============================================
# File Upload (Optional)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# ============================================
# Default Admin Account
# ============================================
app.admin.email=${ADMIN_EMAIL:admin@meditrack.com}
app.admin.password=${ADMIN_PASSWORD}
app.admin.full-name=${ADMIN_FULL_NAME:System Administrator}
# ============================================
# CORS
# ============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}