spring.application.name=MediTrack
server.port=8080

# Loads application-local.properties if present (gitignored — real secrets
# for your machine go there). Falls back to the env vars below otherwise,
# e.g. in CI/production where you set real environment variables directly.
spring.config.import=optional:application-local.properties

# ============================================
# PostgreSQL (Supabase)
# ============================================
# No hardcoded credentials here — this file is public. Set DB_URL / DB_USERNAME /
# DB_PASSWORD as real environment variables, or use application-local.properties
# for local dev (see application-local.properties.example).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Connection Pool (HikariCP)
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# Logging
# ============================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# JSON
# ============================================
spring.jackson.serialization.indent-output=true

# ============================================
# JWT
# ============================================
# No hardcoded secret — this file is public. Set JWT_SECRET as a real env var,
# or use application-local.properties for local dev.
meditrack.jwt.secret=${JWT_SECRET}
meditrack.jwt.expirationMs=86400000

# ============================================
# File Upload (Optional)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


app.admin.email=${ADMIN_EMAIL:admin@meditrack.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMe123!}
app.admin.full-name=${ADMIN_FULL_NAME:System Administrator}