spring.application.name=MediTrack
server.port=8080

# ============================================
# PostgreSQL (Supabase)
# ============================================
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.bemwdtmhinrbxvcfoqie
spring.datasource.password=3Lym4b1n1123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Connection Pool (HikariCP)
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# Logging
# ============================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# JSON
# ============================================
spring.jackson.serialization.indent-output=true

# ============================================
# JWT
# ============================================
meditrack.jwt.secret=MySecretKeyForMediTrackJWTTokenGenerationAndValidation12345
meditrack.jwt.expirationMs=86400000

# ============================================
# File Upload (Optional)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


app.admin.email=${ADMIN_EMAIL:admin@meditrack.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMe123!}
app.admin.full-name=${ADMIN_FULL_NAME:System Administrator}