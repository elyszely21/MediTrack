spring.application.name=MediTrack

# ---- Server (Render injects PORT) ----
server.port=${PORT:8080}

# ---- PostgreSQL ----
# Connection details are set by RenderDatabaseConfig, which reads
# the DATABASE_URL env var from the attached Postgres env group.
# No hardcoded URL / credentials here.
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ---- Connection Pool (HikariCP) ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ---- Logging (quiet for prod) ----
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ---- JSON ----
spring.jackson.serialization.indent-output=false

# ---- JWT ----
# NOTE: Do NOT rely on fallback JWT secrets in production.
meditrack.jwt.secret=${JWT_SECRET}
meditrack.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# ---- File Upload ----

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Default Admin Account ----
app.admin.email=${ADMIN_EMAIL:admin@meditrack.com}
# NOTE: Do NOT rely on fallback admin password in production.
app.admin.password=${ADMIN_PASSWORD}
app.admin.full-name=${ADMIN_FULL_NAME:System Administrator}

# ---- CORS (comma-separated list of allowed origins) ----

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
